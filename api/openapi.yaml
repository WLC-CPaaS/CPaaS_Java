openapi: 3.0.1
info:
  contact:
    email: support@whitelabelcomm.com
    name: CPaaS API Support
    url: https://whitelabelcomm.com
  description: A CPaaS platform API
  title: White Label Communications CPaas API Documentation
  version: "1.1"
servers:
- url: //api.beta.cpaaslabs.net/
paths:
  /v1/account:
    get:
      description: Retrieve a list of all CPaaS accounts that exist within your organization.
      parameters:
      - description: start_key for pagination that was returned as next_start_key
          from your previous call
        in: query
        name: start_key
        schema:
          type: string
      - description: "number of records to return, range 1 to 50"
        in: query
        name: page_size
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsAccountGetAll"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Account List
      tags:
      - Account
      x-accepts:
      - application/json
    post:
      description: Create an account.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.VOIPAccountAddData"
        description: account fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsAccountGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Create Account
      tags:
      - Account
      x-codegen-request-body-name: account
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/apikey:
    get:
      description: Authenticate an application or user request to get the client ID
        and client secret for a CPaaS account.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsAccountAPIKey"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      tags:
      - Account
      x-accepts:
      - application/json
  /v1/account/phonenumber:
    get:
      description: Obtain all phone numbers that have not been assigned to a CPaaS
        account within your organization.
      parameters:
      - description: "Start key for pagination, obtained from previous responses"
        in: query
        name: start_key
        schema:
          type: string
      - description: "Number of records to return per page (range: 1 to 50)"
        in: query
        name: page_size
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsAccountPhonenumberGetAll"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Unassigned Numbers List
      tags:
      - Phone Number
      x-accepts:
      - application/json
    post:
      description: Purchase or activate a phone number for CPaaS accounts within your
        business.
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: string
              type: array
        description: phonenumber fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsOrderPhonenumber"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Purchase Number
      tags:
      - Phone Number
      x-codegen-request-body-name: phonenumber
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/phonenumber/assign:
    post:
      description: Assign a purchased phone number to an account.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.DocsPhonenumberAssignPayload"
        description: assignment payload
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.APIResponseStatusCodeOnly"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Assign Number
      tags:
      - Phone Number
      x-codegen-request-body-name: payload
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/phonenumber/disconnect:
    post:
      description: Disconnecting a phone number from a CPaaS account relinquishes
        ownership of the number back to the carrier.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.DocsPhonenumberUnassignPayload"
        description: disconnect payload
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.APIResponseStatusCodeOnly"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Disconnect Number
      tags:
      - Phone Number
      x-codegen-request-body-name: payload
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/phonenumber/unassign:
    post:
      description: Remove a phone number from an account and place it back on the
        list of unassigned phone numbers.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.DocsPhonenumberUnassignPayload"
        description: unassign payload
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.APIResponseStatusCodeOnly"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Unassign Number
      tags:
      - Phone Number
      x-codegen-request-body-name: payload
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/{accountID}/callflow:
    get:
      description: Permit a user to view the callflow details in an account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: start_key for pagination that was returned as next_start_key
          from your previous call
        in: query
        name: start_key
        schema:
          type: string
      - description: "number of records to return, range 1 to 50"
        in: query
        name: page_size
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallflowGetAll"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Callflow List
      tags:
      - Callflow
      x-accepts:
      - application/json
    post:
      description: Create instructions for routing a call to a user or system.
      parameters:
      - description: "Account ID, 32 alpha-numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.CallflowAddEditData"
        description: Call flow configuration
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallflowGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Create Call Group
      tags:
      - Callflow
      x-codegen-request-body-name: request
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/{accountID}/callflow/{callflowID}:
    delete:
      description: Delete a callflow in an account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "callflow ID, 32 alpha numeric"
        in: path
        name: callflowID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallflowGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Delete Call Group
      tags:
      - Callflow
      x-accepts:
      - application/json
    get:
      description: Get the details for a single callflow in an account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "Callflow ID, 32 alpha numeric"
        in: path
        name: callflowID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallflowGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Call Group Details
      tags:
      - Callflow
      x-accepts:
      - application/json
    put:
      description: Update the details for a single callflow in an account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "Callflow ID, 32 alpha numeric"
        in: path
        name: callflowID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.CallflowAddEditData"
        description: payload fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallflowGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Update Call Group
      tags:
      - Callflow
      x-codegen-request-body-name: reqBody
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/{accountID}/callqueue:
    get:
      description: Retrieve call queue details for an account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallQueueGetAll"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Call Queues
      tags:
      - Call Queue Management
      x-accepts:
      - application/json
    post:
      description: Set up a call queue in an account for specific inbound calls.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.VOIPCallQueueAddEditData"
        description: payload fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallQueueGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Create Call Queue
      tags:
      - Call Queue Management
      x-codegen-request-body-name: reqBody
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/{accountID}/callqueue/{queueID}:
    delete:
      description: Remove the call queue from an account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "Queue ID, 32 alpha numeric"
        in: path
        name: queueID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallQueueGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Delete Call Queue
      tags:
      - Call Queue Management
      x-accepts:
      - application/json
    get:
      description: "Capture metadata about a specific queue, such as queue_type and\
        \ agent_wrapup_time."
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "Queue ID, 32 alpha numeric"
        in: path
        name: queueID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallQueueGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Call Queue Details
      tags:
      - Call Queue Management
      x-accepts:
      - application/json
    put:
      description: Update the metadata mentioned above.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "Queue ID, 32 alpha numeric"
        in: path
        name: queueID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.VOIPCallQueueAddEditData"
        description: payload fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallQueueGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Update Call Queue
      tags:
      - Call Queue Management
      x-codegen-request-body-name: reqBody
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/{accountID}/callqueue/{queueID}/status:
    get:
      description: "Access the status of a call queue in an account, such as the number\
        \ of available agents (recipients), estimated wait time, and number of active\
        \ sessions."
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "Queue ID, 32 alpha numeric"
        in: path
        name: queueID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCallQueueGetSingleStatus"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Call Queue Status
      tags:
      - Call Queue Management
      x-accepts:
      - application/json
  /v1/account/{accountID}/cdr:
    get:
      description: Retrieve a list of CDRs in a specific account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: Page size (Maximum number of results to display per page)
        in: query
        name: page_size
        schema:
          type: string
      - description: Start key (Starting offset for displaying results)
        in: query
        name: start_key
        schema:
          type: string
      - description: "For displaying records which are created on or after this timestamp\
          \ (Supported timestamp formats: iso 8601, unix time in seconds or milliseconds\
          \ or microseconds or nanoseconds)"
        in: query
        name: created_from
        schema:
          type: string
      - description: "For displaying records which are created on or before this timestamp\
          \ (Supported timestamp formats: iso 8601, unix time in seconds or milliseconds\
          \ or microseconds or nanoseconds)"
        in: query
        name: created_to
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCdrGetAll"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get CDR List
      tags:
      - Data
      x-accepts:
      - application/json
  /v1/account/{accountID}/cdr/{cdrID}:
    get:
      description: Retrieve the details of a single CDR record from an account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "CDR ID, string"
        in: path
        name: cdrID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsCdrGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get CDR Details
      tags:
      - Data
      x-accepts:
      - application/json
  /v1/account/{accountID}/channel:
    get:
      description: Get a list of active channels for an account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsChannelGetAll"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Account Channel List
      tags:
      - Channel
      x-accepts:
      - application/json
  /v1/account/{accountID}/channel/{channelID}:
    get:
      description: Access details about each channel in an account.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: Channel ID
        in: path
        name: channelID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsChannelGetSingle"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Channel Details
      tags:
      - Channel
      x-accepts:
      - application/json
    post:
      description: "Link an action, such as transfer or hangup to a channel."
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: Channel ID
        in: path
        name: channelID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.VOIPChannelRunActionData"
        description: payload fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.APIResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Associate Action to Channel
      tags:
      - Channel
      x-codegen-request-body-name: reqBody
      x-content-type: application/json
      x-accepts:
      - application/json
    put:
      description: Link a metaflow to an active channel.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: Channel ID
        in: path
        name: channelID
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/service.VOIPChannelRunMetaflowData"
        description: payload fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.APIResponse"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Associate Metaflow to Channel
      tags:
      - Channel
      x-codegen-request-body-name: reqBody
      x-content-type: application/json
      x-accepts:
      - application/json
  /v1/account/{accountID}/device/{deviceID}/channel:
    get:
      description: Get the list of active channels for a device.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "Device ID, 32 alpha numeric"
        in: path
        name: deviceID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsChannelGetAll"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Get Device Channel List
      tags:
      - Channel
      x-accepts:
      - application/json
  /v1/account/{accountID}/device/{deviceID}/metaflow:
    delete:
      description: Delete all metaflows associated with a device.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
        required: true
        schema:
          type: string
      - description: "Device ID, 32 alpha numeric"
        in: path
        name: deviceID
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/service.DocsMetaflowGet"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPAASError"
          description: Bad Request
      security:
      - bearerauth: []
      summary: Delete Device Metaflow
      tags:
      - Metaflow
      x-accepts:
      - application/json
    get:
      description: Get the list of metaflows for a device.
      parameters:
      - description: "Account ID, 32 alpha numeric"
        in: path
        name: accountID
