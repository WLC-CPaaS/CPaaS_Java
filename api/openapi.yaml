components:
  schemas:
    CPAASError:
      example:
        status_code: 5
        error_code: 5
        message: message
        errors:
        - "{}"
        - "{}"
      properties:
        error_code:
          description: Error Code
          type: integer
        errors:
          description: Error details
          items:
            type: object
          type: array
        message:
          description: Error Message
          type: string
        status_code:
          description: HTTP response status code
          type: integer
      type: object
    MenuInputData:
      example:
        name: name
        media: "{}"
        timeout: 4805
      properties:
        media:
          allOf:
          - $ref: "#/components/schemas/MenuOutputDetailMedia"
          description: The media (prompt) parameters
          type: object
        name:
          description: A friendly name for the menu
          maxLength: 128
          type: string
        timeout:
          description: The amount of time (in milliseconds) to wait for the caller
            to begin entering digits
          maximum: 60000
          minimum: 1
          type: integer
      required:
      - name
      type: object
    MenuOutputDetail:
      example:
        status_code: 0
        data: "{}"
        request_id: request_id
      properties:
        data:
          allOf:
          - $ref: "#/components/schemas/MenuOutputDetailData"
          description: Data Payload
          type: object
        request_id:
          description: Unique id for each request
          type: string
        status_code:
          description: HTTP response status code
          type: integer
      type: object
    MenuOutputDetailData:
      properties:
        id:
          description: ID of the menu
          type: string
        media:
          allOf:
          - $ref: "#/components/schemas/MenuOutputDetailMedia"
          description: The media (prompt) parameters
          type: object
        name:
          description: A friendly name for the menu
          type: string
        timeout:
          description: The amount of time (in milliseconds) to wait for the caller
            to begin entering digits
          type: integer
      type: object
    MenuOutputDetailMedia:
      properties:
        greeting:
          description: The ID of a media object that should be used as the menu greeting
          maxLength: 2048
          minLength: 3
          type: string
        invalid_media:
          description: When the collected digits don't result in a match or hunt this
            media can be played
          type: object
        transfer_media:
          description: "When a call is transferred from the menu, either after all\
            \ retries exhausted or a successful hunt, this media can be played"
          type: object
      type: object
    MenuOutputList:
      example:
        status_code: 6
        data:
        - features:
          - features
          - features
          flags:
          - flags
          - flags
          name: name
          id: id
        - features:
          - features
          - features
          flags:
          - flags
          - flags
          name: name
          id: id
        next_start_key: next_start_key
        start_key: start_key
        request_id: request_id
        page_size: 0
      properties:
        data:
          description: Data Payload
          items:
            $ref: "#/components/schemas/MenuOutputListData"
          type: array
        next_start_key:
          description: "List Pagination: Used to get the next page of results. Will\
            \ not exist if this is the last page."
          type: string
        page_size:
          description: "List Pagination: The number of results returned in this page"
          type: integer
        request_id:
          description: Unique id for each request
          type: string
        start_key:
          description: "List Pagination: Code for paged results"
          type: string
        status_code:
          description: HTTP response status code
          type: integer
      type: object
    MenuOutputListData:
      example:
        features:
        - features
        - features
        flags:
        - flags
        - flags
        name: name
        id: id
      properties:
        features:
          description: Features used in this menu
          items:
            type: string
          type: array
        flags:
          description: Flags set by external applications
